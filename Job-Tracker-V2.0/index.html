<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --surface2: #edeae3;
      --border: #ddd9d0;
      --text: #1a1814;
      --text-muted: #7a7670;
      --accent: #2d5be3;
      --accent-light: #dce6ff;
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
      --amber: #d97706;
      --amber-light: #fef3c7;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 12px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg: #0f0e0c;
      --surface: #1c1b18;
      --surface2: #252420;
      --border: #333028;
      --text: #f0ede6;
      --text-muted: #857f74;
      --accent: #5b82f5;
      --accent-light: #1a2547;
      --green-light: #0d2e1a;
      --red-light: #2e0d0d;
      --amber-light: #2e1e06;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ===== TOAST ===== */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      max-width: 320px;
      animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1) forwards;
      cursor: pointer;
    }

    .toast.hide { animation: slideOut 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--green); }
    .toast.error .toast-dot { background: var(--red); }
    .toast.info .toast-dot { background: var(--accent); }
    .toast.warning .toast-dot { background: var(--amber); }

    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(110%); opacity: 0; }
    }

    /* ===== LAYOUT ===== */
    .wrapper { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }

    .logo-area p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); }

    .btn-icon {
      width: 38px; height: 38px;
      padding: 0;
      justify-content: center;
      border-radius: 8px;
    }

    /* ===== STAT CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: box-shadow var(--transition);
    }
    .stat-card:hover { box-shadow: var(--shadow); }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card.total .stat-value { color: var(--text); }
    .stat-card.interview .stat-value { color: var(--green); }
    .stat-card.rejected .stat-value { color: var(--red); }
    .stat-card.pending .stat-value { color: var(--amber); }

    /* ===== PROGRESS BAR ===== */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .progress-bar-track {
      height: 10px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      display: flex;
      gap: 2px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .fill-interview { background: var(--green); }
    .fill-rejected { background: var(--red); }
    .fill-pending { background: var(--amber); }

    .progress-legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .filter-tab {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .filter-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border var(--transition);
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .job-count-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ===== LIST VIEW ===== */
    #list-view { display: flex; flex-direction: column; gap: 12px; }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      position: relative;
      transition: all var(--transition);
      border-left-width: 4px;
      animation: cardIn 0.3s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .job-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

    .job-card.status-interview { border-left-color: var(--green); }
    .job-card.status-rejected { border-left-color: var(--red); }
    .job-card.status-pending { border-left-color: var(--border); }

    .job-avatar {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      flex-shrink: 0;
      color: var(--text);
    }

    .job-info { flex: 1; min-width: 0; }
    .job-company { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .job-title-text { font-size: 14px; color: var(--text-muted); margin-bottom: 6px; }
    .job-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .job-motive-text { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .action-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1.5px solid;
      transition: all var(--transition);
      letter-spacing: 0.04em;
    }
    .action-btn.interview-btn { border-color: var(--green); color: var(--green); background: transparent; }
    .action-btn.interview-btn:hover { background: var(--green-light); }
    .action-btn.rejected-btn { border-color: var(--red); color: var(--red); background: transparent; }
    .action-btn.rejected-btn:hover { background: var(--red-light); }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-pending { background: var(--surface2); color: var(--text-muted); }
    .badge-interview { background: var(--green-light); color: var(--green); }
    .badge-rejected { background: var(--red-light); color: var(--red); }

    .card-top-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .delete-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .delete-btn:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }

    /* ===== KANBAN VIEW ===== */
    #kanban-view {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .kanban-col {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 400px;
    }

    .kanban-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .kanban-col-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .kanban-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-pending { background: var(--text-muted); }
    .dot-interview { background: var(--green); }
    .dot-rejected { background: var(--red); }

    .kanban-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 99px;
      padding: 2px 8px;
    }

    .kanban-cards { display: flex; flex-direction: column; gap: 10px; }

    .kanban-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: default;
      transition: all var(--transition);
      animation: cardIn 0.3s ease forwards;
    }
    .kanban-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

    .kanban-card-company { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .kanban-card-title { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .kanban-card-salary { font-size: 11px; color: var(--text-muted); }
    .kanban-card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    .kaction {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1.5px solid;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all var(--transition);
      letter-spacing: 0.04em;
    }
    .kaction.interview { border-color: var(--green); color: var(--green); background: transparent; }
    .kaction.interview:hover { background: var(--green-light); }
    .kaction.rejected { border-color: var(--red); color: var(--red); background: transparent; }
    .kaction.rejected:hover { background: var(--red-light); }
    .kaction.remove { border-color: var(--border); color: var(--text-muted); background: transparent; }
    .kaction.remove:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      padding: 32px;
      transform: translateY(20px);
      transition: transform var(--transition);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select option { background: var(--surface); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }
    .empty-state svg { margin: 0 auto 16px; opacity: 0.3; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      #kanban-view { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .job-card { flex-direction: column; }
      .card-top-right { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Add Job Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add New Job</h2>
        <button class="modal-close" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Company *</label>
          <input class="form-input" id="f-company" placeholder="e.g. Google" />
        </div>
        <div class="form-group">
          <label class="form-label">Job Title *</label>
          <input class="form-input" id="f-title" placeholder="e.g. Frontend Dev" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="f-location" placeholder="e.g. Remote" />
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="f-type">
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Hybrid</option>
            <option>Remote</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Salary / Range</label>
        <input class="form-input" id="f-salary" placeholder="e.g. $80,000 - $120,000" />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="f-desc" placeholder="Brief job description..."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-submit">Add Job</button>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <!-- Header -->
    <header>
      <div class="logo-area">
        <h1>Job Tracker</h1>
        <p>Track your applications in one place</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-icon" id="dark-toggle" title="Toggle dark mode">
          <svg id="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn btn-ghost" id="export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export CSV
        </button>
        <button class="btn btn-primary" id="add-job-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Job
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card total">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">0</div>
      </div>
      <div class="stat-card interview">
        <div class="stat-label">Interview</div>
        <div class="stat-value" id="stat-interview">0</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-label">Rejected</div>
        <div class="stat-value" id="stat-rejected">0</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Application Progress</span>
        <span id="progress-label" style="font-size:13px;color:var(--text-muted)">0% response rate</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill fill-interview" id="bar-interview" style="width:0%"></div>
        <div class="progress-bar-fill fill-rejected" id="bar-rejected" style="width:0%"></div>
        <div class="progress-bar-fill fill-pending" id="bar-pending" style="width:100%"></div>
      </div>
      <div class="progress-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Interview</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Rejected</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> Pending</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="pending">Pending</button>
        <button class="filter-tab" data-filter="interview">Interview</button>
        <button class="filter-tab" data-filter="rejected">Rejected</button>
      </div>

      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="search-input" placeholder="Search company or title..." />
      </div>

      <div class="view-toggle">
        <button class="view-btn active" id="list-view-btn" title="List view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <button class="view-btn" id="kanban-view-btn" title="Kanban view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="12" rx="1"/>
          </svg>
        </button>
      </div>

      <span class="job-count-label" id="job-count-label">0 jobs</span>
    </div>

    <!-- List View -->
    <div id="list-view"></div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      <h3>No jobs found</h3>
      <p>Try a different filter or add a new job</p>
    </div>

    <!-- Kanban View -->
    <div id="kanban-view">
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-title"><span class="kanban-dot dot-pending"></span>Pending</span>
          <span class="kanban-count" id="k-pending-count">0</span>
        </div>
        <div class="kanban-cards" id="k-pending"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-title"><span class="kanban-dot dot-interview"></span>Interview</span>
          <span class="kanban-count" id="k-interview-count">0</span>
        </div>
        <div class="kanban-cards" id="k-interview"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-title"><span class="kanban-dot dot-rejected"></span>Rejected</span>
          <span class="kanban-count" id="k-rejected-count">0</span>
        </div>
        <div class="kanban-cards" id="k-rejected"></div>
      </div>
    </div>
  </div>

<script src="./script.js">
</script>
</body>
</html>
